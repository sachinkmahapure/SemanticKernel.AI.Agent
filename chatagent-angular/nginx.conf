server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SSE — disable all buffering so streaming chunks reach the browser immediately
    location /chat/stream {
        proxy_pass           http://api:8080;
        proxy_http_version   1.1;
        proxy_set_header     Host $host;
        proxy_set_header     X-Real-IP $remote_addr;
        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   300s;
        chunked_transfer_encoding on;
        add_header           X-Accel-Buffering no;
    }

    # All other API routes
    location ~ ^/(chat|health|approvals|swagger) {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Angular SPA — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "no-cache";
    }

    # Cache static assets aggressively (Angular adds content hashes)
    location ~* \.(js|css|png|jpg|svg|ico|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
