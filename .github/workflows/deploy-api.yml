name: Deploy .NET API → Railway

on:
  push:
    branches: [develop]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-chatagent-api

jobs:
  # ── 1. Test first ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore & Build
        run: |
          dotnet restore AI.ChatAgent.sln
          dotnet build AI.ChatAgent.sln --no-restore -c Release

      - name: Unit tests
        run: |
          dotnet test tests/AI.ChatAgent.Tests/AI.ChatAgent.Tests.csproj \
            --no-build -c Release \
            --filter "Category!=Integration" \
            --logger "trx;LogFileName=results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results

  # ── 2. Build & push Docker image to GHCR ──────────────────────────────────
  docker:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime

  # ── 3a. Deploy to Railway ──────────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    needs: docker
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    # Only runs if RAILWAY_TOKEN secret is set
    if: ${{ secrets.RAILWAY_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service ai-chatagent-api \
            --detach \
            --environment production

  # ── 3b. Deploy to Render (alternative free host) ──────────────────────────
  deploy-render:
    name: Deploy to Render
    needs: docker
    runs-on: ubuntu-latest
    # Only runs if RENDER_DEPLOY_HOOK secret is set AND Railway token is absent
    if: ${{ secrets.RENDER_DEPLOY_HOOK != '' && secrets.RAILWAY_TOKEN == '' }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Render deployment triggered"
