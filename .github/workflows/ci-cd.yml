name: CI — Build, Test & Scan

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - run: dotnet restore AI.ChatAgent.sln
      - run: dotnet build AI.ChatAgent.sln --no-restore -c Release

      - name: Unit tests + coverage
        run: |
          dotnet test tests/AI.ChatAgent.Tests/AI.ChatAgent.Tests.csproj \
            --no-build -c Release \
            --filter "Category!=Integration" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results

      - name: Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./test-results/**/coverage.cobertura.xml

  angular-build:
    name: Angular Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chatagent-angular/package-lock.json
      - working-directory: chatagent-angular
        run: npm ci --legacy-peer-deps
      - working-directory: chatagent-angular
        run: npm run build:prod

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: |
          dotnet restore AI.ChatAgent.sln
          dotnet list package --vulnerable --include-transitive 2>&1 | tee audit.txt
        continue-on-error: true
      - working-directory: chatagent-angular
        run: npm audit --audit-level=high || true
      - uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit.txt
