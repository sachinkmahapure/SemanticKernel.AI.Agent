# Lightweight local stack — SQLite + in-memory cache
# RAM: ~400 MB total (no SQL Server, Redis, or Seq)
# Run: docker-compose up -d

services:

  # ── .NET API ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-chatagent
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # SQLite — persisted via a named volume (no SQL Server needed)
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/chatagent.db
      # No Redis connection string → app automatically uses AddDistributedMemoryCache()
      # Set your OpenAI key here or via: export OPENAI_API_KEY=sk-...
      - AI__Provider=OpenAI
      - AI__OpenAI__ApiKey=${OPENAI_API_KEY:-sk-replace-me}
      - AI__OpenAI__ChatModelId=gpt-4o-mini
      - AI__OpenAI__EmbeddingModelId=text-embedding-3-small
      - WebSearch__Provider=Serper
      - WebSearch__Serper__ApiKey=${SERPER_API_KEY:-}
    volumes:
      - sqlite-data:/app/data          # SQLite database file
      - app-logs:/app/logs             # log files
      - ./src/AI.ChatAgent/SampleData:/app/SampleData:ro   # RAG documents
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Angular UI ────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./chatagent-angular
      dockerfile: Dockerfile
    container_name: ai-chatagent-ui
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m

volumes:
  sqlite-data:
  app-logs:
